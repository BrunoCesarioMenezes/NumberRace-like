<div class="padlock-visual">
    <div class="padlock-shackle"></div>
    <div class="padlock-body">
        <p class="padlock-status">Cadeado ${index + 1}</p>

        <div class="digit-inputs-container">

        </div>

        <div class="padlock-actions default-actions">
            <button class="btn btn-unlock" id="unlock${index}">Unlock</button>
            <button class="btn btn-edit" id="edit${index}">Edit</button>
        </div>

        <div class="padlock-actions edit-actions" style="display: none;">
            <button class="btn btn-save" id="save${index}">Save</button>
            <button class="btn btn-cancel" id="cancel${index}">Cancel</button>
        </div>
    </div>
</div>
